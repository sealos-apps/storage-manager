apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.web.configMapName | quote }}
  namespace: {{ include "sealos-storage-manager.namespace" . | quote }}
  labels:
    {{- include "sealos-storage-manager.labels" . | nindent 4 }}
data:
  runtime-config.js: |
    window.__SEALOS_STORAGE_MANAGER_CONFIG__ = {
      apiBaseUrl: {{ .Values.web.runtimeConfig.apiBaseUrl | quote }},
      forcedLanguage: {{ .Values.web.runtimeConfig.forcedLanguage | quote }},
      fileUploadTusThresholdBytes: {{ .Values.web.runtimeConfig.fileUploadTusThresholdBytes }},
      fileUploadTusChunkBytes: {{ .Values.web.runtimeConfig.fileUploadTusChunkBytes }},
      fileUploadTusRetryCount: {{ .Values.web.runtimeConfig.fileUploadTusRetryCount }},
    }
  nginx.conf: |
    server {
      listen {{ .Values.web.containerPort }};
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      client_max_body_size {{ .Values.web.nginx.clientMaxBodySize }};

      location = /runtime-config.js {
        add_header Cache-Control "no-store";
        try_files /runtime-config.js =404;
      }

      location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass {{ include "sealos-storage-manager.backendURL" . }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location /internal/filebrowser-hook/verify {
        proxy_pass {{ include "sealos-storage-manager.backendURL" . }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location /metrics {
        proxy_pass {{ include "sealos-storage-manager.backendURL" . }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
