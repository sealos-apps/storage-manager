apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.service.name | quote }}
  namespace: {{ include "sealos-storage-manager.namespace" . | quote }}
  labels:
    {{- include "sealos-storage-manager.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type | quote }}
  selector:
    {{- include "sealos-storage-manager.backendSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.targetPort }}
