apiVersion: apps/v1
kind: Deployment
metadata:
  name: viewer-web
  namespace: sealos-storage-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: viewer-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: viewer-web
    spec:
      containers:
        - name: web
          image: sealos-storage-manager-web:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /usr/share/nginx/html/runtime-config.js
              subPath: runtime-config.js
              readOnly: true
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: viewer-web-config
