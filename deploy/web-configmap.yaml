apiVersion: v1
kind: ConfigMap
metadata:
  name: viewer-web-config
  namespace: sealos-storage-manager
data:
  runtime-config.js: |
    window.__SEALOS_STORAGE_MANAGER_CONFIG__ = {
      apiBaseUrl: '/api',
      fileUploadTusThresholdBytes: 33554432,
      fileUploadTusChunkBytes: 8388608,
      fileUploadTusRetryCount: 5,
    }
  nginx.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      client_max_body_size 0;

      location = /runtime-config.js {
        add_header Cache-Control "no-store";
        try_files /runtime-config.js =404;
      }

      location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://viewer-backend.sealos-storage-manager.svc.cluster.local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location /internal/filebrowser-hook/verify {
        proxy_pass http://viewer-backend.sealos-storage-manager.svc.cluster.local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location /metrics {
        proxy_pass http://viewer-backend.sealos-storage-manager.svc.cluster.local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
