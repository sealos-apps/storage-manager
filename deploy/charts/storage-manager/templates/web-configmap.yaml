apiVersion: v1
kind: ConfigMap
{{- $config := default dict .Values.config }}
{{- $configWeb := default dict (get $config "web") }}
{{- $configRuntime := default dict (get $config "runtimeConfig") }}
{{- $configNginx := default dict (get $config "nginx") }}
{{- $user := default dict .Values.user }}
{{- $webUser := default dict (get $user "web") }}
{{- $webValues := default dict .Values.web }}
{{- $webRuntime := default dict (get $webValues "runtimeConfig") }}
{{- $webNginx := default dict (get $webValues "nginx") }}
{{- $apiBaseURL := default (get $webRuntime "apiBaseUrl") (get $configWeb "apiBaseUrl") }}
{{- $apiBaseURL = default $apiBaseURL (get $webUser "apiBaseUrl") }}
{{- $forcedLanguage := default (get $webRuntime "forcedLanguage") (get $configRuntime "forcedLanguage") }}
{{- $fileUploadTusThresholdBytes := default (get $webRuntime "fileUploadTusThresholdBytes") (get $configRuntime "fileUploadTusThresholdBytes") }}
{{- $fileUploadTusChunkBytes := default (get $webRuntime "fileUploadTusChunkBytes") (get $configRuntime "fileUploadTusChunkBytes") }}
{{- $fileUploadTusRetryCount := default (get $webRuntime "fileUploadTusRetryCount") (get $configRuntime "fileUploadTusRetryCount") }}
{{- $clientMaxBodySize := default (get $webNginx "clientMaxBodySize") (get $configNginx "clientMaxBodySize") }}
metadata:
  name: {{ .Values.web.configMapName | quote }}
  namespace: {{ include "storage-manager.namespace" . | quote }}
  labels:
    {{- include "storage-manager.labels" . | nindent 4 }}
data:
  runtime-config.js: |
    window.__SEALOS_STORAGE_MANAGER_CONFIG__ = {
      apiBaseUrl: {{ $apiBaseURL | quote }},
      forcedLanguage: {{ $forcedLanguage | quote }},
      fileUploadTusThresholdBytes: {{ $fileUploadTusThresholdBytes | int64 }},
      fileUploadTusChunkBytes: {{ $fileUploadTusChunkBytes | int64 }},
      fileUploadTusRetryCount: {{ $fileUploadTusRetryCount | int64 }},
    }
  nginx.conf: |
    server {
      listen {{ .Values.web.containerPort }};
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      client_max_body_size {{ $clientMaxBodySize }};

      location = /runtime-config.js {
        add_header Cache-Control "no-store";
        try_files /runtime-config.js =404;
      }

      location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass {{ include "storage-manager.backendURL" . }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location /internal/filebrowser-hook/verify {
        proxy_pass {{ include "storage-manager.backendURL" . }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location /metrics {
        proxy_pass {{ include "storage-manager.backendURL" . }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
