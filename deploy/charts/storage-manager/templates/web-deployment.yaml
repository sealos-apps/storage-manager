apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.web.service.name | quote }}
  namespace: {{ include "storage-manager.namespace" . | quote }}
  labels:
    {{- include "storage-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "storage-manager.webSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "storage-manager.webSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: web
          image: {{ include "storage-manager.webImage" . | quote }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.web.containerPort }}
          volumeMounts:
            - name: config
              mountPath: /usr/share/nginx/html/runtime-config.js
              subPath: runtime-config.js
              readOnly: true
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ .Values.web.configMapName | quote }}
