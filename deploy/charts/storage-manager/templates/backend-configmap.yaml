apiVersion: v1
kind: ConfigMap
{{- $config := default dict .Values.config }}
{{- $configFeatures := default dict (get $config "features") }}
{{- $configIntegrations := default dict (get $config "integrations") }}
{{- $configViewer := default dict (get $config "viewer") }}
{{- $configFilebrowser := default dict (get $config "filebrowser") }}
{{- $configFilebrowserPod := default dict (get $configFilebrowser "pod") }}
{{- $configStorageQuota := default dict (get $config "storageQuota") }}
{{- $configPVCMetrics := default dict (get $config "pvcMetrics") }}
{{- $user := default dict .Values.user }}
{{- $features := default dict (get $user "features") }}
{{- $integrations := default dict (get $user "integrations") }}
{{- $viewerUser := default dict (get $user "viewer") }}
{{- $backendConfig := default dict .Values.backend.config }}
{{- $backendAdmin := default dict (get $backendConfig "admin") }}
{{- $backendViewer := default dict (get $backendConfig "viewer") }}
{{- $backendFilebrowser := default dict (get $backendViewer "filebrowser") }}
{{- $backendFilebrowserPod := default dict (get $backendViewer "pod") }}
{{- $backendStorageQuota := default dict (get $backendViewer "storageQuota") }}
{{- $backendPVCMetrics := default dict (get $backendViewer "pvcMetrics") }}
{{- $adminUserIds := list }}
{{- if hasKey $backendAdmin "allowedUserIds" }}
{{- $adminUserIds = get $backendAdmin "allowedUserIds" }}
{{- end }}
{{- if hasKey $config "adminUserIds" }}
{{- $adminUserIds = get $config "adminUserIds" }}
{{- end }}
{{- if hasKey $user "adminUserIds" }}
{{- $adminUserIds = get $user "adminUserIds" }}
{{- end }}
{{- $hookClientToken := default "" (get $config "hookClientToken") }}
{{- $hookClientToken = default $hookClientToken (get $user "hookClientToken") }}
{{- $loginURLMode := default "" (get $configViewer "filebrowserLoginUrlMode") }}
{{- $loginURLMode = default $loginURLMode (get $viewerUser "filebrowserLoginUrlMode") }}
{{- $fileManagementEnabled := get $configFeatures "fileManagement" }}
{{- if hasKey $features "fileManagement" }}
{{- $fileManagementEnabled = get $features "fileManagement" }}
{{- end }}
{{- $pvcCreationEnabled := get $configFeatures "pvcCreation" }}
{{- if hasKey $features "pvcCreation" }}
{{- $pvcCreationEnabled = get $features "pvcCreation" }}
{{- end }}
{{- $storageQuotaEnabled := get $configFeatures "storageQuota" }}
{{- if hasKey $features "storageQuota" }}
{{- $storageQuotaEnabled = get $features "storageQuota" }}
{{- end }}
{{- $pvcMetricsEnabled := get $configFeatures "pvcMetrics" }}
{{- if hasKey $features "pvcMetrics" }}
{{- $pvcMetricsEnabled = get $features "pvcMetrics" }}
{{- end }}
{{- $accountBaseURL := default "" (get $configIntegrations "accountBaseUrl") }}
{{- $accountBaseURL = default $accountBaseURL (get $integrations "accountBaseUrl") }}
{{- $prometheusBaseURL := default "" (get $configIntegrations "prometheusBaseUrl") }}
{{- $prometheusBaseURL = default $prometheusBaseURL (get $integrations "prometheusBaseUrl") }}
{{- $storageClassServiceAccountName := default "" (get $backendAdmin "storageClassServiceAccountName") }}
{{- $filebrowserImage := default (get $backendFilebrowser "image") (get $configFilebrowser "image") }}
{{- $filebrowserBinaryPath := default (get $backendFilebrowser "binaryPath") (get $configFilebrowser "binaryPath") }}
{{- $filebrowserPort := default (get $backendFilebrowser "port") (get $configFilebrowser "port") }}
{{- $filebrowserTokenTTL := default (get $backendFilebrowser "tokenTtl") (get $configFilebrowser "tokenTtl") }}
{{- $filebrowserLoginTimeout := default (get $backendFilebrowser "loginTimeout") (get $configFilebrowser "loginTimeout") }}
{{- $storageQuotaQueryTimeout := default (get $backendStorageQuota "queryTimeout") (get $configStorageQuota "queryTimeout") }}
{{- $storageQuotaSystemQuota := default (get $backendStorageQuota "systemQuota") (get $configStorageQuota "systemQuota") }}
{{- $pvcMetricsQueryTimeout := default (get $backendPVCMetrics "queryTimeout") (get $configPVCMetrics "queryTimeout") }}
{{- $podServiceAccountName := default (get $backendFilebrowserPod "serviceAccountName") (get $configFilebrowserPod "serviceAccountName") }}
{{- $podMountPath := default (get $backendFilebrowserPod "mountPath") (get $configFilebrowserPod "mountPath") }}
{{- $podDatabasePath := default (get $backendFilebrowserPod "databasePath") (get $configFilebrowserPod "databasePath") }}
{{- $podCPURequest := default (get $backendFilebrowserPod "cpuRequest") (get $configFilebrowserPod "cpuRequest") }}
{{- $podMemoryRequest := default (get $backendFilebrowserPod "memoryRequest") (get $configFilebrowserPod "memoryRequest") }}
{{- $podCPULimit := default (get $backendFilebrowserPod "cpuLimit") (get $configFilebrowserPod "cpuLimit") }}
{{- $podMemoryLimit := default (get $backendFilebrowserPod "memoryLimit") (get $configFilebrowserPod "memoryLimit") }}
metadata:
  name: {{ .Values.backend.configMapName | quote }}
  namespace: {{ include "storage-manager.namespace" . | quote }}
  labels:
    {{- include "storage-manager.labels" . | nindent 4 }}
data:
  viewer.yaml: |
    admin:
      allowed_user_ids:
{{- range $adminUserIds }}
        - {{ . | quote }}
{{- end }}
      storage_class_service_account_name: {{ $storageClassServiceAccountName | quote }}

    viewer:
      backend_verify_url: {{ include "storage-manager.backendVerifyURL" . | quote }}
      hook_client_token: {{ $hookClientToken | quote }}
      hook_script: |
        #!/bin/sh
        set -eu

        fail() {
          echo "hook.action=block"
          exit 0
        }

        case "${PASSWORD:-}" in
          *.*) ;;
          *) fail ;;
        esac

        case "${USERNAME:-}" in
          vs_[A-Za-z0-9_-]*) ;;
          *) fail ;;
        esac

        AUTH_REQUEST_ID="${PASSWORD%%.*}"
        SECRET="${PASSWORD#*.}"
        case "$AUTH_REQUEST_ID" in
          ar_[A-Za-z0-9_-]*) ;;
          *) fail ;;
        esac
        PASSWORD_HASH="$(printf "%s" "$SECRET" | sha256sum | awk '{print $1}')"

        case "${POD_SESSION_ID:-}" in
          ps_[A-Za-z0-9_-]*) ;;
          *) fail ;;
        esac

        BODY="$(printf '{"pod_session_id":"%s","viewer_pod_name":"%s","username":"%s","auth_request_id":"%s","password_hash":"%s"}' \
          "$POD_SESSION_ID" \
          "$VIEWER_POD_NAME" \
          "$USERNAME" \
          "$AUTH_REQUEST_ID" \
          "$PASSWORD_HASH")"

        RESPONSE="$(curl -fsS --max-time 2 \
          -H "Authorization: Bearer ${HOOK_CLIENT_TOKEN:-}" \
          -H "Content-Type: application/json" \
          -d "$BODY" \
          "${BACKEND_VERIFY_URL:-}")" || fail

        echo "$RESPONSE" | grep -q '"allow"[[:space:]]*:[[:space:]]*true' || fail

        echo "hook.action=auth"
        echo "user.scope=/"
        echo "user.hideDotfiles=false"
        echo "user.perm.admin=false"
        echo "user.perm.execute=false"
        echo "user.perm.share=false"
        echo "user.perm.download=true"
        if echo "$RESPONSE" | grep -q '"create"[[:space:]]*:[[:space:]]*true'; then
          echo "user.perm.create=true"
          echo "user.perm.rename=true"
          echo "user.perm.modify=true"
          echo "user.perm.delete=true"
        else
          echo "user.perm.create=false"
          echo "user.perm.rename=false"
          echo "user.perm.modify=false"
          echo "user.perm.delete=false"
        fi
      filebrowser:
        image: {{ $filebrowserImage | quote }}
        binary_path: {{ $filebrowserBinaryPath | quote }}
        port: {{ $filebrowserPort }}
        token_ttl: {{ $filebrowserTokenTTL | quote }}
        login_timeout: {{ $filebrowserLoginTimeout | quote }}
        login_url_mode: {{ $loginURLMode | quote }}
      file_management:
        enabled: {{ $fileManagementEnabled }}
      pvc_creation:
        enabled: {{ $pvcCreationEnabled }}
      storage_quota:
        enabled: {{ $storageQuotaEnabled }}
        account_base_url: {{ $accountBaseURL | quote }}
        query_timeout: {{ $storageQuotaQueryTimeout | quote }}
        system_quota: {{ $storageQuotaSystemQuota | quote }}
      pvc_metrics:
        enabled: {{ $pvcMetricsEnabled }}
        prometheus_base_url: {{ $prometheusBaseURL | quote }}
        query_timeout: {{ $pvcMetricsQueryTimeout | quote }}
      pod:
        service_account_name: {{ $podServiceAccountName | quote }}
        mount_path: {{ $podMountPath | quote }}
        database_path: {{ $podDatabasePath | quote }}
        cpu_request: {{ $podCPURequest | quote }}
        memory_request: {{ $podMemoryRequest | quote }}
        cpu_limit: {{ $podCPULimit | quote }}
        memory_limit: {{ $podMemoryLimit | quote }}
      service:
        type: {{ .Values.backend.config.viewer.service.type | quote }}
        port: {{ .Values.backend.config.viewer.service.port }}
      ingress:
        class_name: {{ .Values.backend.config.viewer.ingress.className | quote }}
        host_template: {{ include "storage-manager.viewerHostTemplate" . | quote }}
        public_scheme: {{ include "storage-manager.scheme" . | quote }}
        tls_secret_name: {{ include "storage-manager.viewerTLSSecretName" . | quote }}

    observability:
      service_name: {{ .Values.backend.config.observability.serviceName | quote }}
      logs:
        exporter: {{ .Values.backend.config.observability.logs.exporter | quote }}
        level: {{ .Values.backend.config.observability.logs.level | quote }}
      traces:
        exporter: {{ .Values.backend.config.observability.traces.exporter | quote }}
        endpoint: {{ .Values.backend.config.observability.traces.endpoint | quote }}
        sample_ratio: {{ .Values.backend.config.observability.traces.sampleRatio }}
        batch_timeout: {{ .Values.backend.config.observability.traces.batchTimeout | quote }}
        export_timeout: {{ .Values.backend.config.observability.traces.exportTimeout | quote }}

    debug:
      enabled: {{ .Values.backend.config.debug.enabled }}
      forced_namespace: {{ .Values.backend.config.debug.forcedNamespace | quote }}
