cloudDomain: 127.0.0.1.nip.io
cloudPort: ""
httpPort: ""
disableHttps: false
certSecretName: wildcard-cert

config:
  adminUserIds:
    - admin
  hookClientToken: replace-me
  features:
    fileManagement: true
    pvcCreation: true
    storageQuota: true
    pvcMetrics: true
    pvcMountDetection: true
  filebrowser:
    image: filebrowser/filebrowser:v2.30.0
    binaryPath: /filebrowser
    port: 8080
    tokenTtl: 15m
    loginTimeout: 2s
    pod:
      serviceAccountName: ""
      mountPath: /srv
      databasePath: /tmp/filebrowser.db
      cpuRequest: 50m
      memoryRequest: 64Mi
      cpuLimit: 500m
      memoryLimit: 512Mi
  storageQuota:
    queryTimeout: 3s
    systemQuota: 100Gi
  pvcMetrics:
    queryTimeout: 3s
  integrations:
    accountBaseUrl: "http://account-service.account-system.svc:2333"
    prometheusBaseUrl: "http://vmselect-vm-stack-victoria-metrics-k8s-stack.vm.svc.cluster.local:8481/select/0/prometheus"
  viewer:
    hostPrefix: viewer
    backendVerifyUrl: ""
    filebrowserLoginUrlMode: internal
  web:
    apiBaseUrl: /api
    publicHost: ""
  runtimeConfig:
    forcedLanguage: ""
    fileUploadTusThresholdBytes: 33554432
    fileUploadTusChunkBytes: 8388608
    fileUploadTusRetryCount: 5
  nginx:
    clientMaxBodySize: "0"

rbac:
  create: true

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/sealos-apps/storage-manager/storage-manager-backend
    tag: latest
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: viewer-backend
  service:
    name: viewer-backend
    type: ClusterIP
    port: 80
    targetPort: http
  containerPort: 8080
  configMapName: viewer-backend-config
  configMountPath: /app/config
  config:
    viewer:
      service:
        type: ClusterIP
        port: 80
    observability:
      serviceName: storage-manager-viewer
      logs:
        exporter: encore
        level: info
      traces:
        exporter: none
        endpoint: ""
        sampleRatio: 1
        batchTimeout: 5s
        exportTimeout: 5s
    debug:
      enabled: false
      forcedNamespace: ""

web:
  replicaCount: 1
  image:
    repository: ghcr.io/sealos-apps/storage-manager/storage-manager-web
    tag: latest
    pullPolicy: IfNotPresent
  service:
    name: viewer-web
    type: ClusterIP
    port: 80
    targetPort: http
  containerPort: 8080
  configMapName: viewer-web-config
  ingress:
    enabled: true
    className: nginx
    annotations: {}
    path: /
    pathType: Prefix
    tls:
      enabled: true

storageClassAdmin:
  create: true
  serviceAccountName: storageclass-admin
  clusterRoleName: storage-manager-storageclass-admin
  roleName: viewer-backend-impersonate-storageclass-admin

desktopApp:
  create: true
  namespace: app-system
  slug: storage-manager
  name: Storage Manager
  desc: Storage Manager
  displayType: normal
  type: iframe
  iconPath: /favicon.svg
  i18n:
    zh:
      name: 存储管理
    zh-Hans:
      name: 存储管理
