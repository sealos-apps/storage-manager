apiVersion: v1
kind: ServiceAccount
metadata:
  name: storageclass-admin
  # Keep this namespace identical to the backend Deployment namespace. The
  # backend derives the impersonated username from its own namespace plus
  # admin.storage_class_service_account_name.
  namespace: sealos-storage-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: storageclass-admin
rules:
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: storageclass-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: storageclass-admin
subjects:
  - kind: ServiceAccount
    name: storageclass-admin
    namespace: sealos-storage-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: viewer-backend-impersonate-storageclass-admin
  namespace: sealos-storage-manager
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    resourceNames: ["storageclass-admin"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: viewer-backend-impersonate-storageclass-admin
  namespace: sealos-storage-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: viewer-backend-impersonate-storageclass-admin
subjects:
  - kind: ServiceAccount
    name: viewer-backend
    namespace: sealos-storage-manager
