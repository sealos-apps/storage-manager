name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable PNPM
        run: |
          corepack enable
          corepack prepare pnpm@10.12.3 --activate

      - name: Configure PNPM cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Encore
        run: |
          curl -L https://encore.dev/install.sh | bash -s -- "$(cat .encore-version)"
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Check tool versions
        run: make check-go-version

      - name: Install web dependencies
        run: make web-install

      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Verify backend
        run: make backend-verify

      - name: Verify frontend
        run: make web-verify

      - name: Lint backend
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Lint frontend
        run: make web-lint

      - name: Verify deploy chart
        run: make deploy-verify

      - name: Check whitespace
        run: git diff --check
